name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gautamkrishnar/keepalive-workflow@v2

      - name: Ping Supabase
        run: |
          echo "🏓 Đang ping Supabase..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://nafjrifwubpujvqrbkaj.supabase.co/rest/v1/memories?select=id&limit=1" \
            -H "apikey: sb_publishable_A7Rkd6AM1gUgJKcYzzht0g_bS5GMwkl" \
            -H "Authorization: Bearer sb_publishable_A7Rkd6AM1gUgJKcYzzht0g_bS5GMwkl")
          echo "📡 Response: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase OK!"
          else
            echo "⚠️ Response: $RESPONSE"
          fi
