name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://nafjrifwubpujvqrbkaj.supabase.co/rest/v1/memories?select=id&limit=1" \
            -H "apikey: sb_publishable_A7Rkd6AM1gUgJKcYzzht0g_bS5GMwkl" \
            -H "Authorization: Bearer sb_publishable_A7Rkd6AM1gUgJKcYzzht0g_bS5GMwkl")
          echo "📡 Response: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase OK!"
          else
            echo "⚠️ Response: $RESPONSE"
          fi

      - name: Giữ workflow không bị GitHub disable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last ping: $(date)" > .github/last-ping.txt
          git add .github/last-ping.txt
          git diff --staged --quiet || git commit -m "chore: keep alive $(date +'%Y-%m-%d')"
          git push
